<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>금은방언니 상품가격</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      text-align: center;
      font-size: 28px;
    }
    
    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }
    
    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    input[type="text"]:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: #d4af37;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }
    
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-search {
      background-color: #d4af37;
      color: #333;
    }
    
    .btn-search:hover {
      background-color: #c9a227;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
    }
    
    .btn-clear {
      background-color: #f0f0f0;
      color: #666;
    }
    
    .btn-clear:hover {
      background-color: #e0e0e0;
    }
    
    .result {
      margin-top: 30px;
      padding: 20px;
      background-color: #f9f9f9;
      border-radius: 8px;
      border-left: 4px solid #d4af37;
      display: none;
    }
    
    .result.show {
      display: block;
    }
    
    .result-item {
      margin-bottom: 12px;
    }
    
    .result-label {
      color: #666;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    
    .result-value {
      color: #333;
      font-size: 16px;
      font-weight: 500;
      word-break: break-word;
    }
    
    .result-price {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #e0e0e0;
    }
    
    .price-label {
      color: #999;
      font-size: 12px;
      margin-bottom: 8px;
    }
    
    .price-value {
      color: #d4af37;
      font-size: 32px;
      font-weight: bold;
    }
    
    .error {
      color: #e74c3c;
      padding: 15px;
      background-color: #fadbd8;
      border-radius: 6px;
      margin-top: 20px;
      display: none;
    }
    
    .error.show {
      display: block;
    }
    
    .gold-price-banner {
      background: linear-gradient(135deg, #d4af37 0%, #f0e6d2 100%);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 25px;
      text-align: center;
    }
    
    .gold-price-banner-label {
      color: #666;
      font-size: 12px;
      margin-bottom: 4px;
    }
    
    .gold-price-banner-value {
      color: #333;
      font-size: 20px;
      font-weight: bold;
    }
    
    .divider {
      height: 1px;
      background-color: #e0e0e0;
      margin: 20px 0;
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 25px;
      }
      
      h1 {
        font-size: 24px;
      }
      
      .price-value {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💍 금은방언니</h1>
    <p class="subtitle">상품가격 조회</p>
    
    <div class="gold-price-banner">
      <div class="gold-price-banner-label">현재 기준금값</div>
      <div class="gold-price-banner-value" id="currentGoldPrice">로딩 중...</div>
    </div>
    
    <div class="form-group">
      <label for="productCode">제품번호</label>
      <input 
        type="text" 
        id="productCode" 
        placeholder="예: A001"
        autocomplete="off"
      >
    </div>
    
    <div class="button-group">
      <button class="btn-search" onclick="searchProduct()">조회</button>
      <button class="btn-clear" onclick="clearResult()">초기화</button>
    </div>
    
    <div class="error" id="error"></div>
    
    <div class="result" id="result">
      <div class="result-item">
        <div class="result-label">상품명</div>
        <div class="result-value" id="resultModelName"></div>
      </div>
      
      <div class="result-item">
        <div class="result-label">상세정보</div>
        <div class="result-value" id="resultStone"></div>
      </div>
      
      <div class="result-item">
        <div class="result-label">사이즈</div>
        <div class="result-value" id="resultSize"></div>
      </div>
      
      <div class="result-price">
        <div class="price-label">14k 기준 참고가격</div>
        <div class="price-value" id="resultPrice">-</div>
      </div>
    </div>
  </div>

  <script>
    let csvData = [];
    let goldPricePerGram = 240000; // 기본값

    // CSV 로드
    async function loadCSV() {
      try {
        const response = await fetch('products.csv');
        const text = await response.text();
        parseCSV(text);
      } catch (error) {
        console.error('CSV 로드 실패:', error);
        showError('데이터를 불러올 수 없습니다. 잠시 후 다시 시도해주세요.');
      }
    }

    // CSV 파싱
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      
      // 첫 번째 줄에서 기준금값 추출
      if (lines[0]) {
        const firstLine = lines[0].split(',');
        const goldValue = parseFloat(firstLine[3]); // D1: 기준금값(g당)
        if (!isNaN(goldValue)) {
          goldPricePerGram = goldValue;
          document.getElementById('currentGoldPrice').textContent = 
            goldPricePerGram.toLocaleString() + ' 원/g';
        }
      }
      
      // 데이터 행 파싱 (3행부터)
      for (let i = 2; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        
        // CSV 파싱 (쉼표로 구분되지만 따옴표 처리)
        const row = parseCSVLine(line);
        
        if (row.length < 20) continue;
        
        const product = {
          code: row[2]?.trim() || '',           // C열: 제품번호
          modelName: row[1]?.trim() || '',      // B열: 공개 모델명
          stone: row[3]?.trim() || '',          // D열: 보석종류및크기및갯수
          size: row[5]?.trim() || '',           // F열: 샘플사이즈
          price14k: parseFloat(row[19]) || 0    // S열: 총합(14k) (0-indexed)
        };
        
        if (product.code) {
          csvData.push(product);
        }
      }
    }

    // CSV 라인 파싱 (따옴표 처리)
    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let insideQuotes = false;
      
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];
        
        if (char === '"') {
          if (insideQuotes && nextChar === '"') {
            current += '"';
            i++;
          } else {
            insideQuotes = !insideQuotes;
          }
        } else if (char === ',' && !insideQuotes) {
          result.push(current);
          current = '';
        } else {
          current += char;
        }
      }
      
      result.push(current);
      return result;
    }

    // 상품 검색
    function searchProduct() {
      const code = document.getElementById('productCode').value.trim().toUpperCase();
      const error = document.getElementById('error');
      const result = document.getElementById('result');
      
      error.classList.remove('show');
      result.classList.remove('show');
      
      if (!code) {
        showError('제품번호를 입력해주세요.');
        return;
      }
      
      const product = csvData.find(p => p.code.toUpperCase() === code);
      
      if (!product) {
        showError(`제품번호 "${code}"을(를) 찾을 수 없습니다.`);
        return;
      }
      
      // 결과 표시
      document.getElementById('resultModelName').textContent = product.modelName;
      document.getElementById('resultStone').textContent = product.stone || '정보 없음';
      document.getElementById('resultSize').textContent = product.size || '정보 없음';
      document.getElementById('resultPrice').textContent = 
        product.price14k.toLocaleString() + ' 원';
      
      result.classList.add('show');
    }

    // 에러 표시
    function showError(message) {
      const error = document.getElementById('error');
      error.textContent = message;
      error.classList.add('show');
    }

    // 초기화
    function clearResult() {
      document.getElementById('productCode').value = '';
      document.getElementById('result').classList.remove('show');
      document.getElementById('error').classList.remove('show');
      document.getElementById('productCode').focus();
    }

    // Enter 키 처리
    document.getElementById('productCode').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        searchProduct();
      }
    });

    // 페이지 로드 시 CSV 로드
    window.addEventListener('load', loadCSV);
  </script>
</body>
</html>
